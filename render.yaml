services:
  - type: web
    name: aizen-education-api
    env: node
    region: singapore
    plan: free
    rootDir: apps/backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: node dist/main
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: LARK_WEBHOOK_URL
        sync: false
